<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SaltLand markdown song viewer"
    />
    <title>!Songs - SaltLand</title>
    <link rel="stylesheet" href="viewer.css" />
    <link rel="stylesheet" href="viewer-theme.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-header-start">
          <button id="mobile-nav-toggle" class="mobile-nav-toggle" type="button" aria-controls="song-sidebar" aria-expanded="false">Songs</button>
          <a class="site-name" href="#songs">SaltLand</a>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="theme-toggle" type="button">Black theme</button>
        </div>
      </header>
      <button id="mobile-nav-backdrop" class="mobile-nav-backdrop" type="button" aria-label="Close song navigation"></button>

      <div class="site-body" id="songs">
        <aside id="song-sidebar" class="sidebar" aria-label="Song library">
          <div class="sidebar-inner">
            <label class="search-box">
              <span class="search-label">Search files</span>
              <input id="song-search" class="search-input" type="search" placeholder="Type a file name..." autocomplete="off" />
            </label>
            <nav id="song-nav" aria-label="Content navigation"></nav>
          </div>
        </aside>

        <main class="page-area">
          <article class="page">
            <div class="page-head">
              <div>
                <p id="page-kicker" class="page-kicker hidden"></p>
                <h1 id="page-title" class="page-title">!Songs</h1>
              </div>
              <a id="back-link" class="back-link hidden" href="#songs">Back to !Songs</a>
            </div>
            <p id="loading-state" class="status">Loading markdown…</p>
            <div id="page-content" class="hidden" aria-live="polite"></div>
          </article>
        </main>
      </div>
    </div>

    <script src="songs-data.js"></script>
    <script src="viewer-app.js" defer></script>
  </body>
</html>
